name: Release GHCR Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing git tag to publish, for example v1.3.0-mw.1"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      image_owner: ${{ steps.meta.outputs.image_owner }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: meta
        name: Resolve release metadata
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null

          IMAGE_OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="$(git rev-list -n 1 "${RELEASE_TAG}" | cut -c1-12)"

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_owner=${IMAGE_OWNER}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build ${{ matrix.image_name }}
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: plane-backend
            dockerfile: ./apps/api/Dockerfile.api
            context: ./apps/api
            build_args: ""
          - image_name: plane-web
            dockerfile: ./apps/web/Dockerfile.web
            context: .
            build_args: |
              VITE_API_BASE_URL=
              VITE_ADMIN_BASE_URL=
              VITE_ADMIN_BASE_PATH=/god-mode
              VITE_LIVE_BASE_URL=
              VITE_LIVE_BASE_PATH=/live
              VITE_SPACE_BASE_URL=
              VITE_SPACE_BASE_PATH=/spaces
              VITE_WEB_BASE_URL=
          - image_name: plane-admin
            dockerfile: ./apps/admin/Dockerfile.admin
            context: .
            build_args: |
              VITE_API_BASE_URL=
              VITE_API_BASE_PATH=/api
              VITE_ADMIN_BASE_URL=
              VITE_ADMIN_BASE_PATH=/god-mode
              VITE_SPACE_BASE_URL=
              VITE_SPACE_BASE_PATH=/spaces
              VITE_LIVE_BASE_URL=
              VITE_LIVE_BASE_PATH=/live
              VITE_WEB_BASE_URL=
              VITE_WEB_BASE_PATH=
              VITE_WEBSITE_URL=${{ vars.PUBLIC_PLANE_WEBSITE_URL || 'https://plane.meetwise.ru' }}
              VITE_SUPPORT_EMAIL=${{ vars.PUBLIC_PLANE_SUPPORT_EMAIL || 'info@meetwise.ru' }}
          - image_name: plane-space
            dockerfile: ./apps/space/Dockerfile.space
            context: .
            build_args: |
              VITE_API_BASE_URL=
              VITE_API_BASE_PATH=/api
              VITE_ADMIN_BASE_URL=
              VITE_ADMIN_BASE_PATH=/god-mode
              VITE_SPACE_BASE_URL=
              VITE_SPACE_BASE_PATH=/spaces
              VITE_LIVE_BASE_URL=
              VITE_LIVE_BASE_PATH=/live
              VITE_WEB_BASE_URL=
              VITE_WEB_BASE_PATH=
              VITE_WEBSITE_URL=${{ vars.PUBLIC_PLANE_WEBSITE_URL || 'https://plane.meetwise.ru' }}
              VITE_SUPPORT_EMAIL=${{ vars.PUBLIC_PLANE_SUPPORT_EMAIL || 'info@meetwise.ru' }}
          - image_name: plane-live
            dockerfile: ./apps/live/Dockerfile.live
            context: .
            build_args: ""
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ needs.prepare.outputs.image_owner }}/${{ matrix.image_name }}:${{ needs.prepare.outputs.release_tag }}
            ghcr.io/${{ needs.prepare.outputs.image_owner }}/${{ matrix.image_name }}:${{ needs.prepare.outputs.sha_tag }}
          build-args: ${{ matrix.build_args }}

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-and-push
    steps:
      - name: Publish summary
        run: |
          {
            echo "## GHCR Release Images"
            echo
            echo "Release tag: \`${{ needs.prepare.outputs.release_tag }}\`"
            echo
            echo "- \`ghcr.io/${{ needs.prepare.outputs.image_owner }}/plane-backend:${{ needs.prepare.outputs.release_tag }}\`"
            echo "- \`ghcr.io/${{ needs.prepare.outputs.image_owner }}/plane-web:${{ needs.prepare.outputs.release_tag }}\`"
            echo "- \`ghcr.io/${{ needs.prepare.outputs.image_owner }}/plane-admin:${{ needs.prepare.outputs.release_tag }}\`"
            echo "- \`ghcr.io/${{ needs.prepare.outputs.image_owner }}/plane-space:${{ needs.prepare.outputs.release_tag }}\`"
            echo "- \`ghcr.io/${{ needs.prepare.outputs.image_owner }}/plane-live:${{ needs.prepare.outputs.release_tag }}\`"
            echo
            echo "Commit tag: \`${{ needs.prepare.outputs.sha_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
