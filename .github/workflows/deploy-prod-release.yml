name: Deploy Production Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy, for example v1.3.0-mw.1"
        required: true
        type: string
      deploy_path:
        description: "Target deploy directory on the production server"
        required: true
        default: "/opt/plane-prod"
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Release To Production
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.PLANE_PROD_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PLANE_PROD_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Run remote deploy script
        shell: bash
        run: |
          set -euo pipefail
          ssh "${{ secrets.PLANE_PROD_DEPLOY_USER }}@${{ secrets.PLANE_PROD_DEPLOY_HOST }}" \
            "cd '${{ github.event.inputs.deploy_path }}' && ./scripts/deploy-release.sh '${{ github.event.inputs.release_tag }}'"
