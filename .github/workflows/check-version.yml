name: Version Change Before Release

on:
  pull_request:
    branches:
      - main

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6

      - name: Get PR Branch version
        run: echo "PR_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Fetch base branch
        run: git fetch origin main:main

      - name: Get Main Branch version
        run: |
          git checkout main
          echo "MAIN_VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Compare branch version against main
        run: |
          echo "Comparing versions: PR version is $PR_VERSION, main version is $MAIN_VERSION"
          if [ "$PR_VERSION" == "$MAIN_VERSION" ]; then
            echo "Version in PR branch is the same as in main. Failing the CI."
            exit 1
          else
            echo "Version check passed. Versions are different."
          fi
        env:
          PR_VERSION: ${{ env.PR_VERSION }}
          MAIN_VERSION: ${{ env.MAIN_VERSION }}
