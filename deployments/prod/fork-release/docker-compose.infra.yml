services:
  db:
    image: postgres:15.7-alpine
    container_name: plane-db
    command: postgres -c 'max_connections=1000'
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - plane-pgdata:/var/lib/postgresql/data
    networks:
      - plane-runtime
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:7.2.11-alpine
    container_name: plane-redis
    restart: unless-stopped
    volumes:
      - plane-redisdata:/data
    networks:
      - plane-runtime

  mq:
    image: rabbitmq:3.13.6-alpine
    container_name: plane-mq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - plane-mqdata:/var/lib/rabbitmq
    networks:
      - plane-runtime

volumes:
  plane-pgdata:
    name: ${POSTGRES_VOLUME_NAME:-prod_plane-pgdata}
  plane-redisdata:
    name: ${REDIS_VOLUME_NAME:-prod_plane-redisdata}
  plane-mqdata:
    name: ${RABBITMQ_VOLUME_NAME:-prod_plane-mqdata}

networks:
  plane-runtime:
    external: true
    name: ${RUNTIME_NETWORK:-prod_plane-net}
