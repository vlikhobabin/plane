x-plane-app-env: &plane-app-env
  WEB_URL: ${WEB_URL}
  DEBUG: ${DEBUG:-0}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
  DATABASE_URL: ${DATABASE_URL}
  SECRET_KEY: ${SECRET_KEY}
  GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
  WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
  AMQP_URL: ${AMQP_URL}
  REDIS_URL: ${REDIS_URL}
  USE_MINIO: ${USE_MINIO:-0}
  MINIO_ENDPOINT_SSL: ${MINIO_ENDPOINT_SSL:-1}
  AWS_REGION: ${AWS_REGION}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
  AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
  EMAIL_HOST: ${EMAIL_HOST}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
  EMAIL_PORT: ${EMAIL_PORT}
  EMAIL_USE_SSL: ${EMAIL_USE_SSL}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
  API_KEY_RATE_LIMIT: ${API_KEY_RATE_LIMIT:-60/minute}
  LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY}

services:
  proxy:
    image: caddy:2.10.0
    container_name: plane-proxy
    restart: unless-stopped
    environment:
      FILE_SIZE_LIMIT: ${FILE_SIZE_LIMIT:-5242880}
    ports:
      - "${LISTEN_ADDRESS:-127.0.0.1}:${LISTEN_PORT:-8090}:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - web
      - admin
      - space
      - live
      - api
    networks:
      - plane-runtime

  api:
    image: ghcr.io/vlikhobabin/plane-backend:${IMAGE_TAG}
    container_name: plane-api
    command: ./bin/docker-entrypoint-api.sh
    restart: unless-stopped
    environment:
      <<: *plane-app-env
    networks:
      - plane-runtime

  worker:
    image: ghcr.io/vlikhobabin/plane-backend:${IMAGE_TAG}
    container_name: plane-worker
    command: ./bin/docker-entrypoint-worker.sh
    restart: unless-stopped
    environment:
      <<: *plane-app-env
    depends_on:
      api:
        condition: service_started
    networks:
      - plane-runtime

  beat:
    image: ghcr.io/vlikhobabin/plane-backend:${IMAGE_TAG}
    container_name: plane-beat
    command: ./bin/docker-entrypoint-beat.sh
    restart: unless-stopped
    environment:
      <<: *plane-app-env
    depends_on:
      api:
        condition: service_started
    networks:
      - plane-runtime

  migrator:
    image: ghcr.io/vlikhobabin/plane-backend:${IMAGE_TAG}
    container_name: plane-migrator
    command: ./bin/docker-entrypoint-migrator.sh
    restart: "no"
    profiles: ["ops"]
    environment:
      <<: *plane-app-env
    networks:
      - plane-runtime

  web:
    image: ghcr.io/vlikhobabin/plane-web:${IMAGE_TAG}
    container_name: plane-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - plane-runtime

  admin:
    image: ghcr.io/vlikhobabin/plane-admin:${IMAGE_TAG}
    container_name: plane-admin
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - plane-runtime

  space:
    image: ghcr.io/vlikhobabin/plane-space:${IMAGE_TAG}
    container_name: plane-space
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - plane-runtime

  live:
    image: ghcr.io/vlikhobabin/plane-live:${IMAGE_TAG}
    container_name: plane-live
    restart: unless-stopped
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: ${REDIS_URL}
      LIVE_SERVER_SECRET_KEY: ${LIVE_SERVER_SECRET_KEY}
    depends_on:
      - api
    networks:
      - plane-runtime

networks:
  plane-runtime:
    external: true
    name: ${RUNTIME_NETWORK:-prod_plane-net}
